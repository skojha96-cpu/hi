<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Exam Management System</h1>
    </header>
    <main>
        <section id="exam-list">
            <h2>Available Exams</h2>
            <ul>
                <li>Math Exam</li>
                <li>Science Exam</li>
                <li>History Exam</li>
            </ul>
        </section>
        <section id="exam-registration">
            <h2>Register for an Exam</h2>
            <form id="registration-form">
                <label for="student-name">Name:</label>
                <input type="text" id="student-name" required>
                <label for="exam-select">Select Exam:</label>
                <select id="exam-select" required>
                    <option value="math">Math Exam</option>
                    <option value="science">Science Exam</option>
                    <option value="history">History Exam</option>
                </select>
                <button type="submit">Register</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Exam Management System</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
